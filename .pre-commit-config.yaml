# Local quality gates — run on every commit.
# Install once:  uv tool install pre-commit && pre-commit install --install-hooks
#                pre-commit install --hook-type commit-msg
# Run all:       pre-commit run --all-files

default_language_version:
  python: python3.12
  node: "22.0.0"

default_stages: [pre-commit]

repos:
  # ---------- universal hygiene ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # ---------- secret scanning ----------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ---------- python: lint, format, types ----------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^apps/api/.*\.py$

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.10.0
    hooks:
      - id: black
        files: ^apps/api/.*\.py$
        args: ["--config=apps/api/pyproject.toml"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^apps/api/app/.*\.py$
        args: ["--config-file=apps/api/pyproject.toml"]
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.6
          - fastapi>=0.115
          - structlog>=24.4
          - uuid6>=2024.7.10
          - types-redis>=4.6
          - sqlalchemy[asyncio]>=2.0.36
          - alembic>=1.14
          - argon2-cffi>=23.1
          - pyjwt[crypto]>=2.10
          - email-validator>=2.0
          - phonenumbers>=8.13
          - pycountry>=24.6

  # ---------- javascript / typescript / json / md / css ----------
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.4.2
    hooks:
      - id: prettier
        files: ^apps/web/.*\.(ts|tsx|js|jsx|json|md|css|yml|yaml)$
        additional_dependencies:
          - prettier@3.4.2

  # ---------- dockerfile lint ----------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        files: ^.*Dockerfile$

  # ---------- conventional commits (commit-msg stage) ----------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: ["feat", "fix", "chore", "docs", "refactor", "test", "perf", "build", "ci", "revert", "style"]

  # ---------- local guardrails ----------
  - repo: local
    hooks:
      - id: block-env-files
        name: block .env files (only *.example allowed)
        language: pygrep
        entry: '.*'
        files: '(^|/)\.env(\.local|\.staging|\.production)?$'
        exclude: '(^|/)\.env(\.local|\.staging|\.production)?\.example$'

      # ---------- pre-push: run pytest before allowing a push ----------
      - id: pytest-api
        name: pytest (api) — pre-push gate
        entry: bash -c 'cd apps/api && uv run pytest -q'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
