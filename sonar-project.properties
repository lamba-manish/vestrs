sonar.projectKey=lamba-manish_vestrs
sonar.organization=lamba-manish
sonar.projectName=Vestrs
sonar.projectVersion=0.1.0

# --- sources ---
sonar.sources=apps/api/app,apps/web/src
sonar.tests=apps/api/tests,apps/web/tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/__pycache__/**,**/*.min.*,apps/api/alembic/versions/**

# --- language analysers ---
sonar.python.version=3.12
sonar.python.coverage.reportPaths=apps/api/coverage.xml
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info
sonar.typescript.tsconfigPaths=apps/web/tsconfig.json

# --- duplicates / coverage thresholds ---
# Sonar will block PRs that drop new-code coverage below the org default
# (80%) or introduce > 3% duplicate lines. Quality-gate is configured in
# the SonarCloud UI, not here.
sonar.coverage.exclusions=**/tests/**,**/*.test.*,**/*.spec.*,apps/api/alembic/**,apps/web/src/App.tsx,apps/web/src/main.tsx,apps/web/src/components/providers.tsx,apps/web/src/components/route-transitions.tsx,apps/web/src/components/theme-provider.tsx,apps/web/src/components/theme-toggle.tsx,apps/web/src/lib/env.ts,apps/web/src/components/ui/**,**/*.config.*

# --- SCM ---
sonar.scm.provider=git
