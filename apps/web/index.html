<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cross-border investment onboarding for high net-worth investors." />
    <meta name="theme-color" content="#0d0d0e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f3eb" media="(prefers-color-scheme: light)" />
    <title>Vestrs</title>
    <script>
      // First-paint theme: read from localStorage, apply class before React mounts.
      (function () {
        try {
          var p = localStorage.getItem("vestrs:theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = p === "light" ? "light" : p === "dark" ? "dark" : prefersDark ? "dark" : "light";
          document.documentElement.classList.toggle("dark", resolved === "dark");
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          // ignore — fall back to .dark class on <html>
        }
      })();
    </script>
  </head>
  <body class="min-h-dvh font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
