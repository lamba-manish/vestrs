# Alembic config. Most settings are read from app.core.config via env.py;
# this file only carries the bits Alembic itself needs.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Empty here — env.py sets the URL from Settings so dev/staging/prod all
# read from the same source of truth.
sqlalchemy.url =

[post_write_hooks]
# Black-format autogenerated revisions so they enter the repo lint-clean.
# Ruff is intentionally NOT a post-hook here — pre-commit will run it on
# the file when staged, which is the canonical entry point.
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
