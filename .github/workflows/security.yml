name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Re-run weekly on Mondays 03:17 UTC so new CVEs in unchanged base
    # images surface even when nothing in the repo changes.
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks · full-history secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scan the full history on push, the PR diff on pull_request.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  trivy-api:
    name: trivy · api image vuln scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          target: runtime
          push: false
          tags: vestrs-api:scan
          load: true
          cache-from: type=gha,scope=api
      - name: Trivy scan (HIGH+CRITICAL fail)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vestrs-api:scan
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: ./.trivyignore
          scanners: vuln
      - name: Trivy SARIF for code-scanning
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vestrs-api:scan
          format: sarif
          output: trivy-api.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: ./.trivyignore
          scanners: vuln
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

  # Web is shipped as a static dist/ bundle served by Caddy — there's no
  # node_modules / pnpm / playwright in production. Filesystem-scan the
  # built artifact (the actual production attack surface) instead of the
  # builder image.
  trivy-web-dist:
    name: trivy · web dist filesystem scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Trivy fs scan of dist/
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/web/dist
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: ./.trivyignore
          scanners: vuln,secret,misconfig
