name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Re-run weekly on Mondays 03:17 UTC so new CVEs in unchanged base
    # images surface even when nothing in the repo changes.
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks · full-history secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scan the full history on push, the PR diff on pull_request.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  trivy:
    name: trivy · image vuln scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: api, context: apps/api, target: runtime }
          - { name: web, context: apps/web, target: builder }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.target.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.target.context }}
          target: ${{ matrix.target.target }}
          push: false
          tags: vestrs-${{ matrix.target.name }}:scan
          load: true
          cache-from: type=gha,scope=${{ matrix.target.name }}
      - name: Trivy scan (HIGH+CRITICAL fail)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: vestrs-${{ matrix.target.name }}:scan
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: ./.trivyignore
          # OS + library scan; skip secret scan here (gitleaks owns that).
          scanners: vuln
      - name: Trivy SARIF for code-scanning
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: vestrs-${{ matrix.target.name }}:scan
          format: sarif
          output: trivy-${{ matrix.target.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: ./.trivyignore
          scanners: vuln
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.target.name }}.sarif
          category: trivy-${{ matrix.target.name }}
