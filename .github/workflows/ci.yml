name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------- backend ----------
  api-lint-types:
    name: api · ruff + black + mypy
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.5.6"
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run black --check .
      - run: uv run mypy app

  api-tests:
    name: api · pytest
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vestrs
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: vestrs
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vestrs -d vestrs"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://vestrs:ci_password@localhost:5432/vestrs
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci_jwt_secret_only_used_for_tests
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.5.6"
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run alembic upgrade head
      - run: uv run pytest -q --cov=app --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage.xml
          if-no-files-found: warn

  # ---------- frontend ----------
  web-lint-types:
    name: web · eslint + tsc
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  web-tests:
    name: web · vitest
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  web-build:
    name: web · vite build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  # ---------- container builds (smoke build only — push happens on release) ----------
  build-images:
    name: docker · build api/worker/web
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [api-lint-types, web-lint-types]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          target: runtime
          push: false
          tags: vestrs-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          load: true
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          target: builder
          push: false
          tags: vestrs-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          load: true
      - name: Save image digests
        run: |
          docker images vestrs-api:ci vestrs-web:ci --format '{{.Repository}}:{{.Tag}} {{.ID}}'
