name: Deploy · staging

on:
  push:
    branches: [release/staging]
  workflow_dispatch:
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [release/staging]

# Stagger deploys behind release.yml — if both fire on the same push,
# this workflow waits for release.yml to publish images first.
concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC into AWS
  contents: read

jobs:
  ssm-deploy:
    name: ssm · run deploy.sh on staging
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Skip when triggered by a failed release.yml run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: staging
      url: https://staging.vestrs.manishlamba.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_STAGING }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}
          role-session-name: gha-deploy-staging-${{ github.run_id }}

      - name: Trigger SSM RunCommand → deploy.sh staging
        id: send
        env:
          INSTANCE_ID: ${{ vars.AWS_INSTANCE_ID_STAGING }}
          REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          CMD=$(aws ssm send-command \
            --region "$REGION" \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --comment "vestrs-staging deploy ${GIT_SHA::7} (run ${GITHUB_RUN_ID})" \
            --cloud-watch-output-config CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/vestrs/staging/deploy \
            --parameters '{
              "commands": [
                "set -euo pipefail",
                "cd /opt/vestrs",
                "sudo -u deploy git fetch --depth=1 origin release/staging",
                "sudo -u deploy git reset --hard FETCH_HEAD",
                "sudo -u deploy bash infra/scripts/deploy.sh staging"
              ],
              "executionTimeout": ["600"]
            }' \
            --query 'Command.CommandId' --output text)
          echo "command_id=$CMD" >> "$GITHUB_OUTPUT"
          echo "::notice title=SSM CommandId::$CMD"

      - name: Wait for SSM command to finish
        env:
          INSTANCE_ID: ${{ vars.AWS_INSTANCE_ID_STAGING }}
          REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
          CMD: ${{ steps.send.outputs.command_id }}
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --region "$REGION" \
              --command-id "$CMD" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text || echo "Pending")
            echo "[$i] status: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                echo "::error::SSM command finished with $STATUS"
                aws ssm get-command-invocation \
                  --region "$REGION" --command-id "$CMD" --instance-id "$INSTANCE_ID" \
                  --query '{stdout:StandardOutputContent,stderr:StandardErrorContent}' \
                  --output json
                exit 1 ;;
            esac
          done
          echo "::error::SSM command timed out after 10m"
          exit 1

      - name: Smoke test public endpoint
        run: |
          for i in $(seq 1 20); do
            if curl -fsS https://staging-api.vestrs.manishlamba.com/healthz > /dev/null; then
              echo "::notice title=staging /healthz::ok"
              exit 0
            fi
            sleep 5
          done
          echo "::error::staging /healthz never came back ok"
          exit 1
