# Production stack — same shape as staging, different floating tag,
# different Caddy config, stricter logging.
#
# Usage on the EC2 host:
#   export VESTRS_TAG=production
#   docker compose -f infra/compose/docker-compose.prod.yml --env-file .env.production pull
#   docker compose -f infra/compose/docker-compose.prod.yml --env-file .env.production up -d

name: vestrs-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    image: ghcr.io/lamba-manish/vestrs-api:${VESTRS_TAG:-production}
    restart: always
    environment:
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOW_ORIGINS: https://vestrs.manishlamba.com
      COOKIE_DOMAIN: .vestrs.manishlamba.com
      LOG_LEVEL: INFO
      ACCREDITATION_RESOLUTION_DELAY_SECONDS: "5"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  worker:
    image: ghcr.io/lamba-manish/vestrs-api:${VESTRS_TAG:-production}
    restart: always
    entrypoint: ["arq", "app.workers.WorkerSettings"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: INFO
      ACCREDITATION_RESOLUTION_DELAY_SECONDS: "5"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      api: { condition: service_started }
    # Disable the inherited Dockerfile HEALTHCHECK (which curls
    # /healthz on :8000) — the worker has no HTTP surface. The slim
    # Python image lacks procps so we can't use pgrep either. Crashloop
    # detection is `restart: always` + arq's own job retry semantics;
    # the agent + dashboard panels track per-job latency / failure
    # rates from the job log + Redis queue depth.
    healthcheck:
      disable: true

  web-publish:
    image: ghcr.io/lamba-manish/vestrs-web:${VESTRS_TAG:-production}
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        rm -rf /srv/web/*
        cp -a /app/dist/. /srv/web/
        echo "web bundle deployed at $$(date -u +%FT%TZ)"
    volumes:
      - web-dist:/srv/web

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - web-dist:/srv/web:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      api: { condition: service_healthy }
      web-publish: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------- observability (mirrors staging; see slice 14C) ----------

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: always
    pid: host
    network_mode: host
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --web.listen-address=:9100
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres: { condition: service_healthy }

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0-alpine
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: always
    volumes:
      - ../observability/exporters/blackbox/blackbox.yml:/config/blackbox.yml:ro
    command: --config.file=/config/blackbox.yml

  grafana-agent:
    image: grafana/agent:v0.43.4
    restart: always
    volumes:
      - ../observability/agent/agent.river:/etc/agent/agent.river:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - agent-data:/var/lib/agent
    command:
      - run
      - /etc/agent/agent.river
      - --storage.path=/var/lib/agent
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      ENV: production
      GRAFANA_CLOUD_PROM_URL:  ${GRAFANA_CLOUD_PROM_URL:-}
      GRAFANA_CLOUD_PROM_USER: ${GRAFANA_CLOUD_PROM_USER:-}
      GRAFANA_CLOUD_LOKI_URL:  ${GRAFANA_CLOUD_LOKI_URL:-}
      GRAFANA_CLOUD_LOKI_USER: ${GRAFANA_CLOUD_LOKI_USER:-}
      GRAFANA_CLOUD_API_KEY:   ${GRAFANA_CLOUD_API_KEY:-}
    profiles:
      - cloud-obs

  # ---------- self-hosted Grafana stack (slice 23) ----------
  # Runs by default. Replaces the cloud-obs grafana-agent above for
  # boxes that don't have a Grafana Cloud account. Memory budget on a
  # t3.small (2GB RAM + 2GB swap) is tight, so retention is short and
  # mem_limits are explicit.

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: always
    user: "65534:65534"  # nobody:nogroup — same UID Prometheus expects.
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=2GB
      - --web.enable-lifecycle
      - --web.listen-address=:9090
    volumes:
      - ../observability/prometheus/prometheus.production.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/grafana/alerts:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api: { condition: service_healthy }
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 3s
      retries: 5

  loki:
    image: grafana/loki:3.2.1
    restart: always
    user: "10001:10001"
    command:
      - -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.2.1
    restart: always
    command:
      - -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ../observability/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/var/lib/promtail
    depends_on:
      loki: { condition: service_healthy }
    mem_limit: 96m

  grafana:
    image: grafana/grafana:11.3.0
    restart: always
    environment:
      # Admin login — set via SSM Parameter Store, never default-public.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Anonymous access off; signup off; users must log in.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      # Public URL is required for OAuth-style flows + correct redirects
      # behind the Caddy reverse proxy.
      GF_SERVER_ROOT_URL: https://monitoring.vestrs.manishlamba.com/
      GF_SERVER_DOMAIN: monitoring.vestrs.manishlamba.com
      # Cookie hardening (Caddy terminates TLS in front of us).
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_CONTENT_TYPE_PROTECTION: "true"
      GF_SECURITY_X_CONTENT_TYPE_OPTIONS: "true"
      GF_SECURITY_X_XSS_PROTECTION: "true"
      # Telemetry off — this is a private monitoring host.
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Disable the public news feed and update banners.
      GF_NEWS_NEWS_FEED_ENABLED: "false"
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus: { condition: service_healthy }
      loki: { condition: service_healthy }
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  web-dist:
  agent-data:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-data:
