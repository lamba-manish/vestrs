# Staging stack — pulls pre-built images from GHCR.
#
# Usage on the EC2 host:
#   export VESTRS_TAG=staging
#   docker compose -f infra/compose/docker-compose.staging.yml --env-file .env.staging pull
#   docker compose -f infra/compose/docker-compose.staging.yml --env-file .env.staging up -d
#
# Only Caddy publishes ports (80, 443). Postgres + Redis are reachable
# only on the internal compose network.

name: vestrs-staging

x-image-tag: &image-tag ${VESTRS_TAG:-staging}

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    image: ghcr.io/lamba-manish/vestrs-api:${VESTRS_TAG:-staging}
    restart: always
    environment:
      APP_ENV: staging
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOW_ORIGINS: https://staging.vestrs.manishlamba.com
      COOKIE_DOMAIN: .vestrs.manishlamba.com
      LOG_LEVEL: INFO
      ACCREDITATION_RESOLUTION_DELAY_SECONDS: "5"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  worker:
    image: ghcr.io/lamba-manish/vestrs-api:${VESTRS_TAG:-staging}
    restart: always
    entrypoint: ["arq", "app.workers.WorkerSettings"]
    environment:
      APP_ENV: staging
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: INFO
      ACCREDITATION_RESOLUTION_DELAY_SECONDS: "5"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      api: { condition: service_started }

  # One-shot — copies the prebuilt static bundle from the web image's
  # /app/dist into a named volume that Caddy serves. Exits 0 on success;
  # Caddy's depends_on waits for that completion before starting.
  web-publish:
    image: ghcr.io/lamba-manish/vestrs-web:${VESTRS_TAG:-staging}
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        rm -rf /srv/web/*
        cp -a /app/dist/. /srv/web/
        echo "web bundle deployed at $$(date -u +%FT%TZ)"
    volumes:
      - web-dist:/srv/web

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - web-dist:/srv/web:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      api: { condition: service_healthy }
      web-publish: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ---------- observability ----------
  # Exporters always run; the cloud agent runs only when
  # GRAFANA_CLOUD_API_KEY is non-empty (set in .env.staging from SSM).

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: always
    pid: host
    network_mode: host
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --web.listen-address=:9100
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres: { condition: service_healthy }

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0-alpine
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: always
    volumes:
      - ../observability/exporters/blackbox/blackbox.yml:/config/blackbox.yml:ro
    command: --config.file=/config/blackbox.yml

  grafana-agent:
    image: grafana/agent:v0.43.4
    restart: always
    volumes:
      - ../observability/agent/agent.river:/etc/agent/agent.river:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - agent-data:/var/lib/agent
    command:
      - run
      - /etc/agent/agent.river
      - --storage.path=/var/lib/agent
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      ENV: staging
      GRAFANA_CLOUD_PROM_URL:  ${GRAFANA_CLOUD_PROM_URL:-}
      GRAFANA_CLOUD_PROM_USER: ${GRAFANA_CLOUD_PROM_USER:-}
      GRAFANA_CLOUD_LOKI_URL:  ${GRAFANA_CLOUD_LOKI_URL:-}
      GRAFANA_CLOUD_LOKI_USER: ${GRAFANA_CLOUD_LOKI_USER:-}
      GRAFANA_CLOUD_API_KEY:   ${GRAFANA_CLOUD_API_KEY:-}
    profiles:
      # The agent only starts when explicitly enabled via the
      # `cloud-obs` profile. .env.staging sets COMPOSE_PROFILES so
      # `docker compose up` picks it up automatically once the
      # GRAFANA_CLOUD_* secrets are populated; without them, the
      # profile stays opt-in and the agent doesn't run.
      - cloud-obs

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  web-dist:
  agent-data:
