# Local development stack.
# Usage: from repo root, `make up`.

name: vestrs

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vestrs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_local}
      POSTGRES_DB: ${POSTGRES_DB:-vestrs}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vestrs} -d ${POSTGRES_DB:-vestrs}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      APP_ENV: local
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vestrs}:${POSTGRES_PASSWORD:-change_me_in_local}@postgres:5432/${POSTGRES_DB:-vestrs}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOW_ORIGINS: http://localhost:3000
      LOG_LEVEL: DEBUG
      ACCREDITATION_RESOLUTION_DELAY_SECONDS: 5
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vestrs}:${POSTGRES_PASSWORD:-change_me_in_local}@postgres:5432/${POSTGRES_DB:-vestrs}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: DEBUG
      ACCREDITATION_RESOLUTION_DELAY_SECONDS: 5
    entrypoint: ["arq", "app.workers.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_APP_ENV: local
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/web:/app
      - web-node-modules:/app/node_modules
      - web-vite-cache:/app/node_modules/.vite
    depends_on:
      - api

  # ---------- observability profile ----------
  # `make obs-up` brings these up; `make up` does not.
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    restart: unless-stopped
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/grafana/alerts:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.1
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/vestrs-api.json
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    profiles: ["observability"]
    restart: unless-stopped
    # macOS Docker Desktop refuses the `rslave` mount propagation flag
    # that this container ships with by default, and `pid: host` only
    # exposes the Linux VM's pid namespace anyway. The container thus
    # reports metrics about its own namespace in dev, which is fine
    # for verifying scrape wiring. On the production EC2 box, slice
    # 14B's compose overlay re-enables the host-mode flags.
    command:
      - --path.rootfs=/
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|etc)($$|/)

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    profiles: ["observability"]
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-vestrs}:${POSTGRES_PASSWORD:-change_me_in_local}@postgres:5432/${POSTGRES_DB:-vestrs}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0-alpine
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    profiles: ["observability"]
    restart: unless-stopped
    volumes:
      - ../observability/exporters/blackbox/blackbox.yml:/config/blackbox.yml:ro
    command: --config.file=/config/blackbox.yml

volumes:
  postgres-data:
  redis-data:
  web-node-modules:
  web-vite-cache:
  prometheus-data:
  grafana-data:
