# Local-dev Prometheus scrape config. Slice 14C.
#
# Targets are reachable on the compose network — use service names
# (api, postgres, redis) and their internal ports. The exporters and
# the API expose unauthenticated /metrics inside the compose network;
# nothing is published outside.
#
# Production scrape happens via grafana-agent (agent.river) which
# remote_writes to Grafana Cloud — *not* via this prometheus.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local
    project: vestrs

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api:8000/healthz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
