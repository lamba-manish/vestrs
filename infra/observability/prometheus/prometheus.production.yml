# Production Prometheus scrape config (slice 23). Same targets as the
# local-dev config, just labelled `env=production` so future federation
# and dashboard filters can distinguish.
#
# This Prometheus is the *single* metrics store for the production box.
# It scrapes the API + the side-car exporters that already run in
# docker-compose.production.yml. The grafana-agent → Grafana Cloud
# pipeline (cloud-obs profile) remains an opt-in alternative; we don't
# run both at once.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production
    project: vestrs

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # node-exporter binds to host network on :9100, so prometheus reaches
  # it via the host gateway rather than the compose service DNS.
  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api:8000/healthz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
