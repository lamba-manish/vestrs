apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # Pinned UID matches the one baked into the JSON dashboards under
    # infra/observability/grafana/dashboards/. Without this, panels
    # render an empty datasource picker on first boot.
    uid: PBFA97CFB590B2093
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Loki: on-box log store fed by promtail (slice 24). The UID is
  # pinned so dashboards reference it stably across rebuilds. In local
  # dev there's no loki container — Grafana shows "Datasource has no
  # connection" on the log panels but the dashboards still load.
  - name: Loki
    type: loki
    uid: vestrs-loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      timeout: 10
      maxLines: 2000
