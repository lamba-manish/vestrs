# Prometheus-format alert rules. These get loaded by:
#   - local Prometheus  : via `rule_files` in prometheus.yml
#   - Grafana Cloud     : `mimirtool rules sync` from CI (slice 14D)
#
# Severity convention:
#   page    → Slack channel + Grafana on-call (24/7)
#   ticket  → low-priority email digest
#
# Edits should always update both the rule and its `summary` so the
# on-call dashboard reads cleanly.

groups:
  - name: vestrs-api
    interval: 30s
    rules:
      - alert: ApiHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="api",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="api"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: page
          team: platform
        annotations:
          summary: "API 5xx error rate above 5% for 5 minutes"
          description: "Sustained 5xx — investigate the latest deploy and the worker queue."

      - alert: ApiHighLatencyP95
        expr: |
          histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job="api"}[5m]))) > 1
        for: 10m
        labels:
          severity: page
          team: platform
        annotations:
          summary: "API p95 latency above 1s for 10 minutes"

      - alert: ApiInstanceDown
        expr: up{job="api"} == 0
        for: 2m
        labels:
          severity: page
          team: platform
        annotations:
          summary: "API instance hasn't responded to scrape for 2 minutes"

      - alert: SyntheticHealthzDown
        expr: avg_over_time(probe_success{job="blackbox-http"}[5m]) < 1
        for: 5m
        labels:
          severity: page
          team: platform
        annotations:
          summary: "Synthetic /healthz probe has been failing for 5 minutes"

  - name: vestrs-host
    interval: 30s
    rules:
      - alert: HostHighMemory
        expr: |
          100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 90
        for: 10m
        labels:
          severity: page
          team: platform
        annotations:
          summary: "Host memory above 90% for 10 minutes"

      - alert: HostHighDisk
        expr: |
          100 * (1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"})) > 80
        for: 10m
        labels:
          severity: ticket
          team: platform
        annotations:
          summary: "Root filesystem above 80% used"

      - alert: HostUnreachable
        expr: up{job="node"} == 0
        for: 5m
        labels:
          severity: page
          team: platform
        annotations:
          summary: "Host node-exporter has been unreachable for 5 minutes"

  - name: vestrs-postgres
    interval: 30s
    rules:
      - alert: PostgresHighConnections
        expr: |
          sum(pg_stat_activity_count) / on() pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: ticket
          team: platform
        annotations:
          summary: "Postgres connection count > 80% of max_connections"

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 5m
        labels:
          severity: page
          team: platform
        annotations:
          summary: "postgres-exporter unreachable for 5 minutes"

  - name: vestrs-tls
    interval: 5m
    rules:
      - alert: TlsCertExpiringSoon
        expr: probe_ssl_earliest_cert_expiry{job="blackbox-http"} - time() < 14 * 24 * 3600
        for: 30m
        labels:
          severity: ticket
          team: platform
        annotations:
          summary: "TLS certificate expires in < 14 days"
          description: "Caddy auto-renews; if this fires, ACME may be failing."

  - name: vestrs-smoke
    interval: 60s
    rules:
      # Canary alert that always fires after 1 minute. Lets the operator
      # verify prometheus → alertmanager → SMTP end-to-end without
      # waiting for a real outage. Delete once you've received the
      # confirmation email; the rule is harmless but noisy if left in.
      - alert: AlertingPipelineSmokeTest
        expr: vector(1)
        for: 1m
        labels:
          severity: ticket
          team: platform
        annotations:
          summary: "Alerting pipeline smoke test"
          description: "If you see this email, prometheus → alertmanager → SMTP is wired up."
